name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# GitHub Actions はジョブごとに別VMなので、node_modules を1ジョブから他へ
# 直接引き継ぐことはできない。setup-node の pnpm キャッシュ（pnpm-lock.yaml
# のハッシュキー）に任せることで、各ジョブの pnpm install を実質「キャッシュ
# 済みの共通セットアップを使い回す」のに近い速さにしている。
# なお先行の install 専用ジョブは意図的に置いていない：cache の保存はジョブ
# 完了時（post-job）に行われ、同時実行中の他ジョブには反映されないため、
# 先行ジョブを needs で待たせても後続ジョブの高速化には寄与せず、
# 起動・完了待ちの分だけ合計時間が伸びるだけになる。

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm typecheck

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm check

  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm lint

  fsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm fsd

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: pnpm install

      # playwright.config.ts の webServer は `pnpm dev` を自前起動するため、
      # build ジョブの成果物には依存しない（build とは完全に独立）。
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # projects は chromium のみ使用しているため、他ブラウザは入れない。
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # test:integration(pyodide-node の WASM ロードに時間がかかる)と
  # test:python(uv によるPython環境構築が要る)はCIに含めない。
  # 軽量な check/typecheck/fsd/test/build/e2e だけを実行対象とする。
